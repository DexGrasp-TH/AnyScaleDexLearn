name: ${test_data_name}
dataset_type: RobotMultiDexDataset
human: False

num_points: 1024

preload_point_clouds: True
# Sample every explicit human prior type by default for fixed-type pose evaluation.
# Override with ["0_any"] when exporting feasibility scores only.
grasp_type_lst: ["1_right_two", "2_right_three", "3_right_full", "4_both_three", "5_both_full"]
pc_centering: True

object_path: ${data_folder}/object/DGN_2k
split_path: valid_split   # relative to object_path

pc_source: complete   # 'partial' for partial_pc**.npy, 'complete' for processed_data/<obj>/complete_point_cloud.npy
pc_path: vision_data/azure_kinect_dk    # relative to object_path, now used for 'partial' pc

test_split: test
test_scene_cfg: tabletop_ur10e/**.npy
mini_test: False

# Optional deterministic random subset for quick sample/evaluation runs.
# Example: test_data.test_object_num=100 test_data.test_subset_seed=7
# ``test_scene_num`` is applied after scene cfg files are collected from the
# selected objects. Leave values <= 0 to keep the full test split.
test_object_num: 0
test_scene_num: 0
test_subset_seed: 0
