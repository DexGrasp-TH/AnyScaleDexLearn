name: ${test_data_name}
dataset_type: RobotMultiDexDataset
human: False

num_points: 1024
traj_length: 3
joint_num: 32 # bimanual leap_sp hands

preload_point_clouds: True
grasp_type_lst: ["0_any"]
pc_centering: True

grasp_path: ${oc.env:AnyScaleGraspDataset}/human_DGN2k_full/leap_sp
object_path: ${oc.env:AnyScaleGraspDataset}/object/DGN_2k
split_path: valid_split   # relative to object_path
pc_source: partial   # 'partial' for partial_pc**.npy, 'complete' for processed_data/<obj>/complete_point_cloud.npy
pc_path: vision_data/three_realsense_d435_random4096    # relative to object_path, used for partial point clouds

test_split: test
test_scene_cfg: tabletop_ur10e/**.npy
mini_test: False

# Optional deterministic random subset for quick sample/evaluation runs.
# Values <= 0 keep the full test split.
test_object_num: 0
test_scene_num: 0
test_subset_seed: 0

# only for visualization
robot_urdf_path: ../BimanBODex/src/curobo/content/assets/robot/leap_hand/dual_dummy_arm_leap_sp.urdf
robot_mesh_dir_path: ../BimanBODex/src/curobo/content/assets/robot/leap_hand
metadata_group: both_full
# Fingertip visual links used when task.robot_mesh_visual_scope=fingertips.
robot_fingertip_link_names:
  - rh_fingertip_1
  - rh_fingertip_2
  - rh_fingertip_3
  - rh_thumb_fingertip
  - lh_fingertip_1
  - lh_fingertip_2
  - lh_fingertip_3
  - lh_thumb_fingertip
