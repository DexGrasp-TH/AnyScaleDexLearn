human: false
dataset_type: RobotMultiDexDataset

runtime:
  num_workers: 10

model:
  traj_length: 3
  joint_num: 32 # bimanual leap hands

paths:
  grasp_path: ${oc.env:AnyScaleGraspDataset}/BimanBODex_full/leap
  object_path: ${oc.env:AnyScaleGraspDataset}/object/DGN_2k
  split_path: valid_split
  pc_path: vision_data/azure_kinect_dk

point_cloud:
  num_points: 1024
  preload: true

augmentation:
  pc_centering: true
  rotation: true
  pc_noise:
    enabled: false
    scale: 0.002

robot:
  urdf_path: ../BimanBODex/src/curobo/content/assets/robot/leap_hand/dual_dummy_arm_leap.urdf
  mesh_dir_path: ../BimanBODex/src/curobo/content/assets/robot/leap_hand
  metadata_group: both_full
