name: visualize_human_prior

# Full robot-specific directory produced by task=obj_human_prior_export.
# The direct children of this path must be object directories, matching:
# obj_human_prior/<step>/<asset>/<robot_name>/<object>/...
prior_dir: output/humanMulti_humanMultiHierar_human_prior_2/obj_human_prior/step_007500_000100/DGN_2k/shadow

# Viser selection mode. The web UI can switch between these modes at runtime.
visualize_mode: random_objects  # random_objects, one_scene
object_id:
scene_id:
random_object_count: 25
scene_option_count: 256
# Number of wrist pose samples shown per grasp type on each one_scene page.
# The Selection panel's Next Batch button advances this sample window; Next
# Scene selects another random scene while keeping the current grasp type.
one_scene_samples_per_type: 5
# Initial Grasp Type dropdown value. 0_any is score-only for random_objects and
# all real grasp types for one_scene; ids 1..5 render wrist poses for that type.
target_grasp_type_id: 0

visualizer: viser
viser_port: 8080
viser_scene_spacing: 0.5
viser_display_mode: all
viser_scene_id: 0

# Point-cloud subsampling for each rendered scene.
num_points: 1024
