# Intrinsic evaluation for Human Prior budget scores.
#
# This task reads saved task=sample test results and does not run sampling,
# BimanBODex, or Bench. Default result paths:
# <output_folder>/<wandb.id>/tests/<ckpt_step>/humanMulti/0_any/**/*.npy
# <output_folder>/<wandb.id>/tests/<ckpt_step>/DGNMulti/0_any/**/*.npy

name: evaluate

# Optional explicit saved-sample inputs. Leave empty to derive them from
# output_folder / wandb.id / ckpt. The default score source is the 0_any folder
# because it stores one Human Prior probability vector per tested scene.
human_results_dir:
dgn_results_dir:
human_results_dataset: humanMulti
dgn_results_dataset: DGNMulti
score_grasp_type: 0_any

# Optional legacy JSONL inputs. When set, these override the corresponding
# saved-sample result directory.
human_score_jsonl:
dgn_score_jsonl:

# Empty means write to <output_folder>/<wandb.id>/tests/<ckpt_step>/evaluation.
output_dir:
report_md:

# Set >0 for quick partial score evaluation.
max_score_rows: 0

# Enable sections independently.
run_human_1a: true
run_dgn_1b: true

# Human label recomputation. These thresholds mirror the pose-class notion used
# by scene_budget.py, but evaluate.py recomputes labels independently.
human_splits: [train, test]
pose_class_rotation_threshold_deg: 45.0
pose_class_bbox_proportion_threshold: 0.2

# Point-cloud descriptor and reporting controls.
scale_max_points: 8192
scale_bucket_count: 4
min_bucket_count: 20
