output_folder: output
data_folder: assets
exp_name: debug
ckpt:       # ckpt path to load, only need the number
resume: True

seed: 0
device: 'cuda:0'
num_workers: 8
persistent_workers: true
prefetch_factor: 2

##########################
# other config yamls
##########################

defaults:
  - _self_
  - task:
  - algo: nflow
  - data: Dexonomy
  - test_data: DGN # object dataset for testing/visualization

task_name: ${hydra:runtime.choices.task}
algo_name: ${hydra:runtime.choices.algo}
data_name: ${hydra:runtime.choices.data}
test_data_name: ${hydra:runtime.choices.test_data}

hydra:
  run:
    dir: ${...output_folder}/${...data_name}_${...algo_name}_${...exp_name}
    

##########################
# wandb logging
##########################
wandb:
  folder: ${output_folder}
  group: ${algo_name}
  id: ${data_name}_${algo_name}_${exp_name}
  mode: online
  project: DexGraspLearn
  resume: ${resume}

timing:
  enabled: false
  cuda_sync: true

model_registry:
  enabled: true
  path: docs/trained_models.md
  # Optional short note supplied by CLI override, e.g. model_registry.key_features="debug7 + scale aug".
  key_features:

